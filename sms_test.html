<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Gateway Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --bg: #0f172a;
            --card-bg: #1e293b;
            --card-border: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-error: #ef4444;
            --accent-info: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.08) 0, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(168, 85, 247, 0.05) 0, transparent 40%);
        }

        /* Navbar */
        nav {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #818cf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .stat-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 700;
        }

        /* Layout Columns */
        .content-cols {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 30px;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .panel-title {
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:hover {
            background: #4f46e5;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }

        /* Table Styling */
        .jobs-table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid var(--card-border);
        }

        td {
            padding: 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--card-border);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-pending { background: rgba(245, 158, 11, 0.1); color: var(--accent-warning); }
        .badge-sent { background: rgba(16, 185, 129, 0.1); color: var(--accent-success); }
        .badge-failed { background: rgba(239, 68, 68, 0.1); color: var(--accent-error); }
        .badge-processing { background: rgba(59, 130, 246, 0.1); color: var(--accent-info); position: relative; padding-left: 20px; }
        
        .dot-pulse {
            position: absolute;
            left: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 6px;
            height: 6px;
            background: var(--accent-info);
            border-radius: 50%;
            box-shadow: 0 0 0px var(--accent-info);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .refresh-status {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .live-indicator {
            width: 8px;
            height: 8px;
            background: var(--accent-success);
            border-radius: 50%;
        }

        /* Gateway List Sidebar */
        .gateway-list {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .gateway-item {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }

        .gateway-item:hover {
            border-color: rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.6);
        }

        .gateway-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .gateway-id {
            font-size: 14px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
        }

        .gateway-last-seen {
            font-size: 11px;
            color: var(--text-muted);
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-pill.online {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-success);
        }

        .status-pill.offline {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-muted);
        }

        .status-dot-mini {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-pill.online .status-dot-mini { background: var(--accent-success); box-shadow: 0 0 5px var(--accent-success); }
        .status-pill.offline .status-dot-mini { background: var(--text-muted); }

        /* Mobile Responsive */
        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .content-cols { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">
            <div class="logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
            </div>
            SMS Gateway Pro
        </div>
        <div class="refresh-status">
            <div class="live-indicator"></div>
            Live Update Active
        </div>
    </nav>

    <main>
        <div class="dashboard-grid">
            <div class="stat-card">
                <span class="stat-label">Total Jobs</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Sent Successfully</span>
                <span class="stat-value" id="stat-sent" style="color: var(--accent-success)">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Pending / Queue</span>
                <span class="stat-value" id="stat-pending" style="color: var(--accent-warning)">0</span>
            </div>
            <div class="stat-card" id="gateway-card">
                <span class="stat-label">Online Gateways</span>
                <span class="stat-value" id="stat-gateways" style="color: var(--accent-info)">0</span>
            </div>
        </div>

        <div class="content-cols">
            <!-- Send SMS Form -->
            <div class="panel">
                <h3 class="panel-title">Send New Message</h3>
                <div class="form-group">
                    <label>Recipient Phone</label>
                    <input type="text" id="phone" placeholder="+63 9xx xxx xxxx" value="+639123456789">
                </div>
                <div class="form-group">
                    <label>Message Content</label>
                    <textarea id="message" rows="5" placeholder="Enter your SMS content here...">Hello from SMS Gateway Pro Dashboard!</textarea>
                </div>
                <button class="btn-primary" onclick="sendSms()">
                    <span>Queue SMS Job</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
                <div id="form-msg" style="margin-top: 15px; font-size: 13px; text-align: center; display: none;"></div>
            </div>

            <!-- New: Connected Gateways List -->
            <div class="panel" style="margin-top: 30px;">
                <h3 class="panel-title">Connected Devices</h3>
                <div class="gateway-list" id="gateway-list">
                    <!-- Gateways will be injected here -->
                    <div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px;">
                        Loading devices...
                    </div>
                </div>
            </div>
        </div>

        <div class="content-cols" style="grid-template-columns: 1fr; margin-top: -10px;">
            <!-- Jobs List -->
            <div class="panel">
                <div class="panel-title">
                    Recent Jobs History
                    <span style="font-size: 12px; color: var(--text-muted); font-weight: normal;">Showing last 50 entries</span>
                </div>
                <div class="jobs-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Recipient</th>
                                <th style="width: 35%">Message</th>
                                <th>Gateway</th>
                                <th>Status</th>
                                <th>Timestamp</th>
                            </tr>
                        </thead>
                        <tbody id="jobs-body">
                            <!-- Rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = 'http://localhost:5001/api/v1';
        const API_KEY = 'osTicketSecret123'; // Matches process.env.OSTICKET_API_KEY in server.js

        async function fetchStats() {
            try {
                const res = await fetch(`${API_BASE}/admin/stats`, {
                    headers: { 'x-api-key': API_KEY }
                });
                const { data } = await res.json();
                document.getElementById('stat-total').innerText = data.total_count;
                document.getElementById('stat-sent').innerText = data.sent_count || 0;
                document.getElementById('stat-pending').innerText = data.pending_count || 0;
                document.getElementById('stat-gateways').innerText = data.online_gateways || 0;
            } catch (e) { console.error('Stats fetch failed'); }
        }

        async function fetchJobs() {
            try {
                const res = await fetch(`${API_BASE}/admin/jobs`, {
                    headers: { 'x-api-key': API_KEY }
                });
                const { data } = await res.json();
                const tbody = document.getElementById('jobs-body');
                tbody.innerHTML = data.map(job => `
                    <tr>
                        <td style="font-family: monospace; color: var(--text-muted)">#${job.id}</td>
                        <td style="font-weight: 500">${job.phone}</td>
                        <td style="color: var(--text-muted); font-size: 13px;">${job.message}</td>
                        <td style="font-family: monospace; font-size: 12px; color: var(--accent-info)">${job.gateway_id || '---'}</td>
                        <td>${getStatusBadge(job.status)}</td>
                        <td style="font-size: 12px; color: var(--text-muted)">${formatDate(job.updated_at)}</td>
                    </tr>
                `).join('');
            } catch (e) { console.error('Jobs fetch failed'); }
        }

        async function fetchGateways() {
            try {
                const res = await fetch(`${API_BASE}/admin/gateways`, {
                    headers: { 'x-api-key': API_KEY }
                });
                const { data } = await res.json();
                const list = document.getElementById('gateway-list');
                
                if (data.length === 0) {
                    list.innerHTML = '<div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 20px;">No devices registered yet.</div>';
                    return;
                }

                list.innerHTML = data.map(gw => {
                    const isOnline = gw.status === 'online' && (new Date() - new Date(gw.last_seen)) < 5 * 60 * 1000;
                    const statusClass = isOnline ? 'online' : 'offline';
                    const statusText = isOnline ? 'Online' : 'Offline';
                    
                    return `
                        <div class="gateway-item">
                            <div class="gateway-info">
                                <span class="gateway-id">${gw.name || gw.gateway_id}</span>
                                <span class="gateway-last-seen">ID: ${gw.gateway_id} • Last active: ${formatTimeOnly(gw.last_seen)}</span>
                            </div>
                            <div class="status-pill ${statusClass}">
                                <div class="status-dot-mini"></div>
                                ${statusText}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { console.error('Gateways fetch failed'); }
        }

        function getStatusBadge(status) {
            if (status === 'processing') {
                return `<span class="badge badge-processing"><div class="dot-pulse"></div>${status}</span>`;
            }
            return `<span class="badge badge-${status}">${status}</span>`;
        }

        function formatTimeOnly(dateStr) {
            if (!dateStr) return 'Never';
            const date = new Date(dateStr);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        async function sendSms() {
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;
            const msgDiv = document.getElementById('form-msg');

            if (!phone || !message) return;

            try {
                const res = await fetch(`${API_BASE}/send-sms`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({ phone, message })
                });

                if (res.ok) {
                    msgDiv.style.color = 'var(--accent-success)';
                    msgDiv.innerText = '✓ Message queued successfully';
                    msgDiv.style.display = 'block';
                    fetchStats();
                    fetchJobs();
                } else {
                    throw new Error('Failed to send');
                }
            } catch (e) {
                msgDiv.style.color = 'var(--accent-error)';
                msgDiv.innerText = '✗ Error queuing message';
                msgDiv.style.display = 'block';
            }

            setTimeout(() => { msgDiv.style.display = 'none'; }, 3000);
        }

        // Auto Refresh
        setInterval(() => {
            fetchStats();
            fetchJobs();
            fetchGateways();
        }, 3000);

        // Initial Load
        fetchStats();
        fetchJobs();
        fetchGateways();
    </script>
</body>
</html>
