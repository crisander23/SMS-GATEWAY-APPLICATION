<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS Gateway Test Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #4F46E5;
            --accent: #10B981;
            --error: #EF4444;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        h2 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: var(--text);
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            padding-bottom: 4px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        input,
        textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus,
        textarea:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th,
        td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-processing {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-sent {
            background: #d1fae5;
            color: #065f46;
        }

        .status-failed {
            background: #fee2e2;
            color: #991b1b;
        }

        .refresh-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .ping-status {
            font-size: 0.875rem;
            font-weight: 600;
        }

        .online {
            color: var(--accent);
        }

        .offline {
            color: var(--error);
        }
    </style>
</head>

<body>
    <div class="container">
        <header style="margin-bottom: 2rem; text-align: center;">
            <h1>SMS Gateway Test Panel</h1>
            <p style="color: var(--text-muted);">Node.js + Express + SQLite</p>
        </header>

        <div class="card">
            <h2>Create SMS Job</h2>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="+639171234567" value="+639171234567">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="message" rows="3"
                    placeholder="Hello this is a test">Hello this is a test from Node.js backend</textarea>
            </div>
            <button onclick="sendSms()">Send SMS</button>
        </div>

        <div class="card">
            <div class="refresh-bar">
                <h2>Recent SMS Jobs</h2>
                <div id="pingStatus" class="ping-status">Checking server...</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Phone</th>
                        <th>Message</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="jobTable">
                    <!-- Jobs will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function checkPing() {
            const status = document.getElementById('pingStatus');
            try {
                const res = await fetch('/ping');
                if (res.ok) {
                    status.innerHTML = '<span class="online">● System Online</span>';
                } else {
                    throw new Error();
                }
            } catch (e) {
                status.innerHTML = '<span class="offline">● System Offline</span>';
            }
        }

        async function fetchJobs() {
            try {
                const res = await fetch('/admin/jobs');
                const jobs = await res.json();
                const tbody = document.getElementById('jobTable');
                tbody.innerHTML = jobs.map(job => `
                    <tr>
                        <td>${job.id}</td>
                        <td>${job.phone}</td>
                        <td>${job.message}</td>
                        <td><span class="status status-${job.status}">${job.status}</span></td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Failed to fetch jobs');
            }
        }

        async function sendSms() {
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;

            if (!phone || !message) return alert('Fill all fields');

            try {
                const res = await fetch('/send-sms', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, message })
                });
                if (res.ok) {
                    fetchJobs();
                }
            } catch (e) {
                alert('Failed to connect to server');
            }
        }

        // Auto refresh
        setInterval(() => {
            checkPing();
            fetchJobs();
        }, 3000);

        // Initial load
        checkPing();
        fetchJobs();
    </script>
</body>

</html>
